<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Toldo Designer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <h1>Toldo Designer</h1>

      <section class="panel">
        <h2>Triangle sizes</h2>
        <ul id="size-list" class="size-list"></ul>
        <button id="add-btn" class="primary" disabled>Add to canvas</button>
      </section>

      <section class="panel">
        <h2>Canvas</h2>
        <p class="hint">Scale: <span id="scale-label">50</span> px / unit</p>
        <p class="hint">Rect 1: <span id="rect1-label"></span></p>
        <p class="hint">Rect 2: <span id="rect2-label"></span> (rotated 90°)</p>
      </section>

      <section class="panel">
        <h2>Items on canvas</h2>
        <ul id="item-list" class="item-list"></ul>
      </section>

      <section class="panel">
        <h2>Saved designs</h2>
        <button id="save-btn" class="primary">Save current design</button>
        <ul id="design-list" class="design-list"></ul>
      </section>
    </aside>

    <main class="stage">
      <section class="view" data-view="top">
        <header class="view-label">Top — X · Y · rotate Z</header>
        <svg
          class="canvas"
          data-view="top"
          xmlns="http://www.w3.org/2000/svg"
        ></svg>
      </section>
      <section class="view" data-view="front">
        <header class="view-label">Front — X · Z · rotate Y</header>
        <svg
          class="canvas"
          data-view="front"
          xmlns="http://www.w3.org/2000/svg"
        ></svg>
      </section>
      <section class="view" data-view="side">
        <header class="view-label">Side — Y · Z · rotate X</header>
        <svg
          class="canvas"
          data-view="side"
          xmlns="http://www.w3.org/2000/svg"
        ></svg>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
